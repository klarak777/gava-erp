version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: gava_erp_db
    restart: always
    environment:
      POSTGRES_DB: gava_erp
      POSTGRES_USER: gava_admin
      POSTGRES_PASSWORD: adminpassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
